[phases.setup]
# Extend the default nix packages. The '...' keeps defaults (Python, pip, etc).
# - ffmpeg: required for video export
# - pkg-config, libmysqlclient: build-deps for mysqlclient wheel
# - openssl, rustc, cargo: build-deps for cryptography wheel
nixPkgs = ['...', 'ffmpeg', 'pkg-config', 'libmysqlclient', 'openssl', 'rustc', 'cargo']
